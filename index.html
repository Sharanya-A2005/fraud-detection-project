<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fraud Detection</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container {
  background: rgba(255,255,255,0.1);
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:340px;
}

input, select {
  width:85%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button {
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  cursor:pointer;
}

.result { margin-top:20px; font-weight:bold; }
.safe { color:#00ffcc; }
.fraud { color:#ff4d4d; }
</style>
</head>

<body>

<div class="container">
<h2>💳 Fraud Detection</h2>

<input id="amount" placeholder="Enter amount">

<select id="location">
  <option value="0">India</option>
  <option value="1">USA</option>
  <option value="2">UK</option>
  <option value="3">Canada</option>
</select>

<select id="time">
  <option value="0">Day</option>
  <option value="1">Night</option>
</select>

<select id="type">
  <option value="0">Shopping</option>
  <option value="1">Food</option>
  <option value="2">Travel</option>
  <option value="3">Bills</option>
  <option value="4">Entertainment</option>
  <option value="5">Education</option>
</select>

<button onclick="checkFraud()">Check</button>

<div id="result" class="result"></div>
<div id="accuracy"></div>
</div>

<script>
function checkFraud() {
  const amount = document.getElementById("amount").value;
  const locValue = document.getElementById("location").value;
  const time = document.getElementById("time").value;
  const type = document.getElementById("type").value;

  let location = (locValue === "0") ? 0 : 1;

  fetch("http://127.0.0.1:5000/check", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ amount, location, time, type })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("result").innerText = data.message;
    document.getElementById("accuracy").innerText = "Accuracy: " + data.accuracy;
  });
}
</script>

</body>
</html>
